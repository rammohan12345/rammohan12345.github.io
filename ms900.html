{mod:"Pricing & Support",id:"m4t1",title:"Licensing, Cost Optimization & Support Options",
content:`Understanding M365 licensing is essential for both the exam and real-world consulting. Let's cover everything.

**Per-User Licensing Model:**
M365 licenses are assigned per user. Each license allows installation on up to 5 devices (5 PCs/Macs + 5 tablets + 5 phones). Users can access web versions from any additional devices. Annual commitment saves 15-20% vs monthly billing.

**All Add-On Licenses:**
On top of any base plan, you can add:
- Microsoft 365 Copilot: $30/user/month (AI assistant in all apps)
- Power BI Pro: $10/user/month (advanced business intelligence)
- Visio Plan 2: $15/user/month (diagramming tool)
- Project Plan 3: $30/user/month (project management)
- Microsoft Teams Phone: $8/user/month (PSTN calling)
- Audio Conferencing: $4/user/month (dial-in meeting numbers)
- Defender for Endpoint P2: $5.20/user/month (advanced endpoint protection)

**Trial Licenses:**
Most M365 plans offer 30-day free trials. This lets you test features before committing. Smart admins use trials to demonstrate value to leadership before purchasing.

**Cost Optimization Strategies:**
1. **Right-size licenses:** Not everyone needs the most expensive plan. Analyze actual usage before assigning.
2. **Use Frontline plans:** Shift workers, retail staff, and factory workers need F1/F3, not E3.
3. **Check license utilization:** Admin Center → Reports → Usage. See who actually uses what. Reclaim unused licenses.
4. **Annual over monthly:** 15-20% savings for committing annually.
5. **Nonprofit and Education discounts:** Up to 75% off or FREE for qualifying organizations!
6. **Remove departed employees promptly:** Every month a former employee's license stays assigned costs money.

**Support Options:**

**Self-Service (Free):**
- Microsoft Learn (learn.microsoft.com): Free courses, learning paths, and certifications
- Microsoft Q&A: Community forums with Microsoft engineers
- M365 Admin Center: Built-in diagnostic tools, guided troubleshooting
- Service Health Dashboard: Real-time status of all services

**Microsoft FastTrack — The Hidden Gem (FREE with 150+ licenses!):**
FastTrack is Microsoft's free deployment guidance service. Microsoft engineers help you:
- Plan your M365 deployment strategy
- Migrate email from on-premises Exchange or Google
- Configure SharePoint, Teams, and OneDrive
- Set up security (MFA, Conditional Access, DLP)
- Train your users with adoption resources
Available for: Exchange Online, SharePoint, OneDrive, Teams, Intune, Azure AD, Windows 11, Microsoft Defender, Power BI. Many organizations don't know about FastTrack and pay consultants for help they could get free!

**Microsoft Unified Support:**
Paid premium support. Dedicated Technical Account Manager (TAM), 24/7 critical situation support, proactive services (health checks, workshops), and designated support engineering. For large enterprises with complex environments.

**Cloud Solution Provider (CSP) Model:**
Many organizations buy M365 through a Microsoft Partner rather than directly from Microsoft.
- Tier 1 (Direct CSP): Partner buys from Microsoft and sells directly to customer
- Tier 2 (Indirect CSP): Partner works through a distributor
Benefits: Single bill for all Microsoft services, local support from the partner, managed services, and often additional value-add services.

**M365 SLAs:**
Microsoft provides financially-backed SLAs for M365 services. The standard SLA is 99.9% uptime (about 8.76 hours of downtime per year). If Microsoft fails to meet the SLA, you receive service credits on your next bill. Check real-time service status at status.office.com.

// UI COMPONENT

function MS900App() {
  const [view, setView] = useState("home");
  const [topicIdx, setTopicIdx] = useState(0);
  const [showQuiz, setShowQuiz] = useState(false);
  const [ans, setAns] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [prog, setProg] = useState(() => {
    try { return JSON.parse(localStorage.getItem("ms900-prog")) || {}; } catch { return {}; }
  });
  const [intIdx, setIntIdx] = useState(0);
  const [intShow, setIntShow] = useState(false);
  const topRef = useRef(null);

  useEffect(() => { try { localStorage.setItem("ms900-prog", JSON.stringify(prog)); } catch {} }, [prog]);
  useEffect(() => { topRef.current?.scrollIntoView({ behavior: "smooth" }); }, [topicIdx, view]);

  const topic = L[topicIdx];
  const modules = [...new Set(L.map(l => l.mod))];
  const getModTopics = (m) => L.filter(l => l.mod === m);
  const pct = Math.round(Object.keys(prog).filter(k => prog[k]).length / L.length * 100);
  const markDone = () => setProg(p => ({ ...p, [topic.id]: true }));
  const c = COURSE.color;

  const Render = ({ text }) => {
    return text.split("\n").map((line, i) => {
      if (!line && i > 0) return <div key={i} style={{ height: 14 }} />;
      let html = line
        .replace(/\*\*(\d+)\.\s([^*]+)\*\*/g, `<span style="color:${c};font-weight:700;font-size:16px">$1. $2</span>`)
        .replace(/\*\*([^*]+)\*\*/g, `<strong style="color:${c}">$1</strong>`)
        .replace(/\*([^*]+)\*/g, `<em style="color:#a0aec0">$1</em>`)
        ;
      if (line.startsWith("- ")) html = `<span style="color:${c};margin-right:8px">●</span>${line.slice(2)}`;
      return <div key={i} style={{ marginBottom: 6, lineHeight: 1.85, fontSize: 15.5, color: "#dce1eb" }} dangerouslySetInnerHTML={{ __html: html }} />;
    });
  };

  const PB = ({ p, h = 8 }) => (
    <div style={{ width: "100%", height: h, borderRadius: h, background: "rgba(255,255,255,0.06)", overflow: "hidden" }}>
      <div style={{ width: `${p}%`, height: "100%", borderRadius: h, background: `linear-gradient(90deg, ${c}, ${c}cc)`, transition: "width 0.6s" }} />
    </div>
  );

  const Card = ({ children, onClick, style = {}, hoverable = true }) => (
    <div onClick={onClick}
      onMouseEnter={hoverable ? e => { e.currentTarget.style.background = "rgba(255,255,255,0.05)"; e.currentTarget.style.transform = "translateY(-1px)"; } : undefined}
      onMouseLeave={hoverable ? e => { e.currentTarget.style.background = "rgba(255,255,255,0.025)"; e.currentTarget.style.transform = "none"; } : undefined}
      style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 16, padding: 22, marginBottom: 14, transition: "all 0.2s", cursor: onClick ? "pointer" : "default", ...style }}>
      {children}
    </div>
  );

  const Btn = ({ children, onClick, bg = c, color = "#fff", disabled, style = {} }) => (
    <button onClick={onClick} disabled={disabled}
      style={{ padding: "12px 24px", borderRadius: 12, border: "none", cursor: disabled ? "default" : "pointer", fontWeight: 600, fontSize: 14, background: bg, color, transition: "all 0.15s", opacity: disabled ? 0.4 : 1, ...style }}>
      {children}
    </button>
  );

  const Chip = ({ children, bg, color: clr }) => (
    <span style={{ display: "inline-block", padding: "5px 14px", borderRadius: 20, fontSize: 12, fontWeight: 600, background: bg || c + "18", color: clr || c }}>{children}</span>
  );

  // ══ HOME ══
  if (view === "home") return (
    <div style={{ fontFamily: "'DM Sans','Segoe UI',sans-serif", minHeight: "100vh", background: "#0a0e1a", color: "#e8ecf4" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 16px 60px" }}>
        <div style={{ textAlign: "center", padding: "32px 0 20px" }}>
          <div style={{ fontSize: 60, marginBottom: 8 }}>{COURSE.icon}</div>
          <h1 style={{ fontSize: 32, fontWeight: 900, color: c, margin: "0 0 6px" }}>MS-900</h1>
          <h2 style={{ fontSize: 20, fontWeight: 600, color: "#e8ecf4", margin: "0 0 8px" }}>Microsoft 365 Fundamentals</h2>
          <p style={{ color: "#8892a6", fontSize: 14, margin: "0 0 16px" }}>Complete course by <span style={{ color: "#FF6B35", fontWeight: 700 }}>Ram Mohan Pathak</span></p>
          <div style={{ display: "flex", alignItems: "center", gap: 12, justifyContent: "center", maxWidth: 400, margin: "0 auto" }}>
            <PB p={pct} />
            <span style={{ fontSize: 16, fontWeight: 700, color: c }}>{pct}%</span>
            <span style={{ fontSize: 12, color: "#5a6478" }}>{Object.keys(prog).filter(k => prog[k]).length}/{L.length} complete</span>
          </div>
        </div>

        {/* Stats */}
        <div style={{ display: "flex", gap: 10, margin: "0 0 20px", flexWrap: "wrap" }}>
          {[{ v: L.length, l: "Lessons", ic: "📖" }, { v: L.reduce((a, l) => a + l.quiz.length, 0), l: "Quiz Questions", ic: "📝" }, { v: COURSE.interview.length, l: "Interview Q's", ic: "🎙️" }, { v: COURSE.roles.length, l: "Job Roles", ic: "💼" }].map((s, i) => (
            <div key={i} style={{ flex: "1 1 100px", background: "rgba(255,255,255,0.025)", borderRadius: 14, padding: "14px 10px", textAlign: "center", border: "1px solid rgba(255,255,255,0.04)" }}>
              <div style={{ fontSize: 14 }}>{s.ic}</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: c }}>{s.v}</div>
              <div style={{ fontSize: 11, color: "#8892a6" }}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* Modules & Topics */}
        {modules.map((mod, mi) => {
          const topics = getModTopics(mod);
          const modDone = topics.filter(t => prog[t.id]).length;
          return (
            <div key={mi} style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                <div style={{ width: 28, height: 28, borderRadius: 8, background: c + "20", color: c, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 14 }}>{mi + 1}</div>
                <h3 style={{ margin: 0, fontSize: 17, fontWeight: 700, color: c, flex: 1 }}>{mod}</h3>
                <span style={{ fontSize: 12, color: "#5a6478" }}>{modDone}/{topics.length}</span>
              </div>
              {topics.map((t, ti) => {
                const done = prog[t.id];
                const idx = L.indexOf(t);
                return (
                  <Card key={t.id} onClick={() => { setTopicIdx(idx); setShowQuiz(false); setAns({}); setSubmitted(false); setView("topic"); }}
                    style={{ borderColor: done ? "#34d39930" : "rgba(255,255,255,0.04)", display: "flex", alignItems: "center", gap: 12, padding: 16 }}>
                    <div style={{ width: 34, height: 34, borderRadius: "50%", background: done ? "#34d39912" : "rgba(255,255,255,0.03)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0, color: done ? "#34d399" : "#5a6478" }}>
                      {done ? "✅" : `${mi + 1}.${ti + 1}`}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600, fontSize: 14, color: "#e8ecf4" }}>{t.title}</div>
                      <div style={{ fontSize: 11, color: "#5a6478", marginTop: 2 }}>📝 {t.quiz.length} quiz questions</div>
                    </div>
                    <span style={{ fontSize: 18, color: "#5a6478" }}>→</span>
                  </Card>
                );
              })}
            </div>
          );
        })}

        {/* Interview & Career */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 10 }}>
          <Card hoverable={false} onClick={() => setView("interview")} style={{ cursor: "pointer" }}>
            <h3 style={{ margin: "0 0 6px", fontSize: 16, color: "#a78bfa" }}>🎙️ Interview Prep</h3>
            <p style={{ fontSize: 12, color: "#8892a6", margin: 0 }}>{COURSE.interview.length} real interview questions with model answers</p>
          </Card>
          <Card hoverable={false} onClick={() => setView("career")} style={{ cursor: "pointer" }}>
            <h3 style={{ margin: "0 0 6px", fontSize: 16, color: "#34d399" }}>💼 Career & Resume</h3>
            <p style={{ fontSize: 12, color: "#8892a6", margin: 0 }}>{COURSE.roles.length} job roles + resume bullet points</p>
          </Card>
        </div>

        <div style={{ textAlign: "center", padding: "24px 0", color: "#3d4556", fontSize: 11 }}>
          Smart Tutor Ram — MS-900 Complete Course by Ram Mohan Pathak
        </div>
      </div>
      <style>{`*{box-sizing:border-box;margin:0}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}button:hover{filter:brightness(1.08)}button:active{transform:scale(0.98)}`}</style>
    </div>
  );

  // ══ TOPIC VIEW ══
  if (view === "topic") {
    const score = topic.quiz.filter((q, i) => ans[i] === q.a).length;
    return (
      <div style={{ fontFamily: "'DM Sans','Segoe UI',sans-serif", minHeight: "100vh", background: "#0a0e1a", color: "#e8ecf4" }}>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
        <div ref={topRef} />
        <nav style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(10,14,26,0.92)", borderBottom: "1px solid rgba(255,255,255,0.05)", padding: "0 16px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 50, backdropFilter: "blur(16px)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <button onClick={() => setView("home")} style={{ background: "none", border: "none", color: "#e8ecf4", cursor: "pointer", fontSize: 18 }}>←</button>
            <span style={{ fontWeight: 800, fontSize: 14, color: c }}>MS-900</span>
          </div>
          <span style={{ fontSize: 12, color: "#5a6478" }}>{topicIdx + 1} / {L.length}</span>
        </nav>
        <div style={{ maxWidth: 800, margin: "0 auto", padding: "20px 16px 60px" }}>
          <div style={{ marginBottom: 16 }}>
            <Chip>{topic.mod}</Chip>
            <h2 style={{ margin: "10px 0 0", fontSize: 24, fontWeight: 800, color: "#e8ecf4" }}>{topic.title}</h2>
          </div>
          <div style={{ display: "flex", gap: 4, marginBottom: 20, background: "rgba(255,255,255,0.02)", borderRadius: 12, padding: 4 }}>
            <Btn onClick={() => setShowQuiz(false)} bg={!showQuiz ? c : "transparent"} color={!showQuiz ? "#fff" : "#8892a6"} style={{ flex: 1 }}>📖 Lesson</Btn>
            <Btn onClick={() => { setShowQuiz(true); setAns({}); setSubmitted(false); }} bg={showQuiz ? c : "transparent"} color={showQuiz ? "#fff" : "#8892a6"} style={{ flex: 1 }}>📝 Quiz ({topic.quiz.length})</Btn>
          </div>

          {!showQuiz ? (
            <Card hoverable={false} style={{ padding: 32, lineHeight: 1.85 }}>
              <Render text={topic.content} />
              <div style={{ marginTop: 28, paddingTop: 18, borderTop: "1px solid rgba(255,255,255,0.06)", display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
                {!prog[topic.id] ? (
                  <Btn onClick={markDone} bg="#34d399" color="#000">✅ Mark Complete</Btn>
                ) : (
                  <Chip bg="#34d39918" color="#34d399">✅ Completed</Chip>
                )}
                {topicIdx < L.length - 1 && (
                  <Btn onClick={() => { setTopicIdx(topicIdx + 1); setShowQuiz(false); setAns({}); setSubmitted(false); }} bg={c + "20"} color={c}>Next Topic →</Btn>
                )}
              </div>
            </Card>
          ) : (
            <div>
              {topic.quiz.map((q, qi) => {
                const sel = ans[qi];
                const ok = submitted && sel === q.a;
                const bad = submitted && sel !== undefined && sel !== q.a;
                return (
                  <Card key={qi} hoverable={false} style={{ borderColor: ok ? "#34d39930" : bad ? "#f8717130" : "rgba(255,255,255,0.04)" }}>
                    <p style={{ margin: "0 0 14px", fontWeight: 700, fontSize: 15, color: "#e8ecf4" }}>Question {qi + 1}: {q.q}</p>
                    {q.o.map((opt, oi) => {
                      const isSel = sel === oi;
                      const isCorrect = submitted && oi === q.a;
                      const isWrong = submitted && isSel && oi !== q.a;
                      return (
                        <button key={oi} onClick={() => !submitted && setAns(p => ({ ...p, [qi]: oi }))}
                          style={{ display: "block", width: "100%", textAlign: "left", padding: "14px 18px", marginBottom: 8, borderRadius: 12, border: `1px solid ${isCorrect ? "#34d39930" : isWrong ? "#f8717130" : isSel ? c + "30" : "transparent"}`, background: isCorrect ? "#34d39912" : isWrong ? "#f8717112" : isSel ? c + "12" : "rgba(255,255,255,0.02)", color: isCorrect ? "#34d399" : isWrong ? "#f87171" : isSel ? c : "#e8ecf4", cursor: submitted ? "default" : "pointer", fontWeight: 500, fontSize: 14, transition: "all 0.15s" }}>
                          {String.fromCharCode(65 + oi)}. {opt}{isCorrect && " ✅"}{isWrong && " ❌"}
                        </button>
                      );
                    })}
                  </Card>
                );
              })}
              {!submitted ? (
                <Btn onClick={() => setSubmitted(true)} disabled={Object.keys(ans).length !== topic.quiz.length}
                  style={{ width: "100%", padding: 14, fontSize: 16 }}>Submit Answers</Btn>
              ) : (
                <Card hoverable={false} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 40 }}>{score === topic.quiz.length ? "🎉" : score >= topic.quiz.length * 0.6 ? "👏" : "📚"}</div>

                  <p style={{ color: "#8892a6", fontSize: 14 }}>{score === topic.quiz.length ? "Perfect! You've mastered this topic!" : "Review incorrect answers and try again."}</p>
                  <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 12 }}>
                    <Btn onClick={() => { setAns({}); setSubmitted(false); }} bg={c + "20"} color={c}>Retry Quiz</Btn>
                    {topicIdx < L.length - 1 && <Btn onClick={() => { setTopicIdx(topicIdx + 1); setShowQuiz(false); setAns({}); setSubmitted(false); }}>Next Topic →</Btn>}
                  </div>
                </Card>
              )}
            </div>
          )}
        </div>
        <style>{`*{box-sizing:border-box;margin:0}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}button:hover{filter:brightness(1.08)}button:active{transform:scale(0.98)}`}</style>
      </div>
    );
  }

  // ══ INTERVIEW VIEW ══
  if (view === "interview") {
    const q = COURSE.interview[intIdx];
    return (
      <div style={{ fontFamily: "'DM Sans','Segoe UI',sans-serif", minHeight: "100vh", background: "#0a0e1a", color: "#e8ecf4" }}>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
        <nav style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(10,14,26,0.92)", borderBottom: "1px solid rgba(255,255,255,0.05)", padding: "0 16px", display: "flex", alignItems: "center", height: 50, gap: 10, backdropFilter: "blur(16px)" }}>
          <button onClick={() => setView("home")} style={{ background: "none", border: "none", color: "#e8ecf4", cursor: "pointer", fontSize: 18 }}>←</button>
          <span style={{ fontWeight: 800, fontSize: 14, color: "#a78bfa" }}>🎙️ Interview Prep</span>
          <span style={{ marginLeft: "auto", fontSize: 12, color: "#5a6478" }}>{intIdx + 1} / {COURSE.interview.length}</span>
        </nav>
        <div style={{ maxWidth: 800, margin: "0 auto", padding: "20px 16px 60px" }}>
          <PB p={(intIdx + 1) / COURSE.interview.length * 100} h={4} />
          <Card hoverable={false} style={{ marginTop: 16 }}>
            <p style={{ fontSize: 11, color: "#5a6478", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, margin: "0 0 8px" }}>Interviewer asks:</p>
            <h3 style={{ margin: 0, fontSize: 20, lineHeight: 1.5, color: "#e8ecf4" }}>"{q.q}"</h3>

            <Btn onClick={() => setIntShow(true)} bg="linear-gradient(135deg, #7c3aed, #ec4899)" style={{ width: "100%", padding: 14, fontSize: 16 }}>💡 Reveal Model Answer</Btn>
          ) : (
            <Card hoverable={false} style={{ borderColor: "#7c3aed25" }}>
              <p style={{ fontSize: 11, color: "#a78bfa", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, margin: "0 0 10px" }}>Model Answer:</p>
              <Render text={q.a} />
            </Card>
          )}
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <Btn onClick={() => { setIntIdx(i => i - 1); setIntShow(false); }} disabled={intIdx === 0} bg="rgba(255,255,255,0.04)" color="#e8ecf4" style={{ flex: 1 }}>← Previous</Btn>
            <Btn onClick={() => { setIntIdx(i => i + 1); setIntShow(false); }} disabled={intIdx === COURSE.interview.length - 1} style={{ flex: 1 }}>Next →</Btn>
          </div>
        </div>
        <style>{`*{box-sizing:border-box;margin:0}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}button:hover{filter:brightness(1.08)}button:active{transform:scale(0.98)}`}</style>
      </div>
    );
  }

  // ══ CAREER VIEW ══
  if (view === "career") return (
    <div style={{ fontFamily: "'DM Sans','Segoe UI',sans-serif", minHeight: "100vh", background: "#0a0e1a", color: "#e8ecf4" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
      <nav style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(10,14,26,0.92)", borderBottom: "1px solid rgba(255,255,255,0.05)", padding: "0 16px", display: "flex", alignItems: "center", height: 50, gap: 10, backdropFilter: "blur(16px)" }}>
        <button onClick={() => setView("home")} style={{ background: "none", border: "none", color: "#e8ecf4", cursor: "pointer", fontSize: 18 }}>←</button>
        <span style={{ fontWeight: 800, fontSize: 14, color: "#34d399" }}>💼 Career Guide</span>
      </nav>
      <div style={{ maxWidth: 800, margin: "0 auto", padding: "20px 16px 60px" }}>
        <Card hoverable={false}>
          <h3 style={{ margin: "0 0 14px", fontSize: 18, color: "#34d399" }}>💼 Roles You Can Apply For After MS-900</h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {COURSE.roles.map((r, i) => <Chip key={i} bg="#34d39912" color="#34d399">{r}</Chip>)}
          </div>
        </Card>
        <Card hoverable={false}>
          <h3 style={{ margin: "0 0 14px", fontSize: 18, color: c }}>📄 Resume Bullet Points</h3>
          <p style={{ fontSize: 13, color: "#8892a6", margin: "0 0 16px" }}>Copy these to your resume under "Technical Skills" or "Experience":</p>
          {COURSE.resume.map((b, i) => (
            <div key={i} style={{ display: "flex", gap: 10, marginBottom: 12, alignItems: "flex-start" }}>
              <span style={{ color: c, fontSize: 16, marginTop: 2, flexShrink: 0 }}>●</span>
              <p style={{ margin: 0, fontSize: 14, lineHeight: 1.7, color: "#e8ecf4" }}>{b}</p>
            </div>
          ))}
        </Card>
      </div>
      <style>{`*{box-sizing:border-box;margin:0}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}button:hover{filter:brightness(1.08)}button:active{transform:scale(0.98)}`}</style>
    </div>
  );

  return null;
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(MS900App));
</script>
</body>
</html>
