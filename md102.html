const { useState, useEffect, useRef, useCallback } = React;


const COURSE = {title:"MD-102: Endpoint Administrator",icon:"💻",color:"#7FBA00",desc:"Modern endpoint management — Autopilot, Intune, Defender, updates, apps, and BYOD.",
roles:["Endpoint Administrator","Intune Admin","Desktop Engineer","Modern Workplace Engineer","Endpoint Security Engineer","SCCM/Intune Engineer","Enterprise Mobility Architect","MDM Specialist"],
resume:["Deployed Windows at scale using Autopilot (User-Driven/Self-Deploying/Pre-Provisioned) with Microsoft Intune","Administered Intune UEM across Windows, macOS, iOS, Android with compliance policies + Conditional Access","Deployed apps: Win32 (.intunewin), Store, M365 Apps, LOB with supersedence and detection rules","Implemented MAM/App Protection for BYOD: block copy/paste, require PIN, selective wipe","Managed WUfB deployment rings, Autopatch, Delivery Optimization, and BitLocker via Intune","Configured Defender for Endpoint: EDR, ASR rules, Controlled Folder Access, vulnerability management","Managed co-management (MECM+Intune) migration, tenant attach, LAPS, and Endpoint Analytics"],
interview:[
{q:"How would you deploy 1000 laptops to remote employees?",a:"Windows Autopilot User-Driven mode. Laptop vendor registers hardware hashes with our tenant. Ships directly to employees' homes. Employee powers on → connects Wi-Fi → signs in with work email → Intune pushes all policies, apps, and settings. Enrollment Status Page blocks access until critical apps install.\n\nNo IT touch needed. Saved a previous company 2000+ hours and $50K in logistics. When COVID hit, our Autopilot-deployed employees were working from day one while others scrambled."},
{q:"Explain your BYOD strategy.",a:"MAM-only approach — no device enrollment required. App Protection Policies on Outlook, Teams, OneDrive: block copy/paste from work apps to personal apps, require PIN/biometric to open managed apps, encrypt app data at rest, block screenshots in managed apps.\n\nConditional Access requires approved client apps. When employee leaves: selective wipe removes only company data — personal photos, messages, and apps are completely untouched. This respects employee privacy while protecting corporate data."},
{q:"How do you migrate from MECM to Intune?",a:"Phased approach over 12-18 months:\n\nPhase 0: Tenant Attach — upload MECM data to Intune portal for visibility\nPhase 1: Enable co-management, shift Compliance Policies and Windows Update workloads\nPhase 2: Import GPOs using Group Policy Analytics, convert to Settings Catalog profiles\nPhase 3: New devices go Azure AD Join + Autopilot (bypass MECM entirely)\nPhase 4: Gradually shift remaining workloads (Device Config, Resource Access, Apps)\nPhase 5: Decommission MECM infrastructure\n\nKey: never do a hard cutover. Gradual workload shifting minimizes risk."}
]};
const L = [
{mod:"Deploy Windows",id:"md102-1",title:"Windows Autopilot & Deployment",
content:"**What is Windows Autopilot?**\nIn the old days, deploying a new laptop meant IT receiving it, unboxing, imaging from USB, installing apps, configuring settings, then shipping to user. That is 2-3 hours per device. For 500 laptops, months of work.\n\nAutopilot changes everything. The laptop vendor registers the hardware hash with your M365 tenant. Ships directly to the employee. Employee powers on, connects Wi-Fi, signs in with work email. Intune pushes all policies, apps, settings. Ready in 30 minutes. IT never touches it.\n\n**Autopilot Profiles:**\n**User-Driven Mode:** User signs in during OOBE. Device registers with Azure AD, enrolls in Intune, receives all policies and apps. Standard for most employees.\n\n**Self-Deploying Mode:** Zero user interaction. Device powers on, connects to network, configures itself using TPM chip identity. For kiosks, digital signage, shared devices, conference room PCs.\n\n**Pre-Provisioned (White Glove):** Two phases. Phase 1: IT pre-stages device (installs heavy apps). Phase 2: User signs in for quick final config. For VIPs or complex setups needing Visual Studio or heavy tools.\n\n**Enrollment Status Page (ESP):** Shows progress: Installing M365 Apps 45 percent, Applying policies 70 percent. Blocks device access until critical items install. Default timeout 60 minutes. Configurable retry and skip options.\n\n**Other Methods:** MDT (image-based PXE, legacy). MECM (enterprise task sequences, being phased out). Subscription Activation (Pro to Enterprise via license, no reimage). Provisioning Packages (USB-based offline config via Windows Configuration Designer).\n\n**Troubleshooting:** ESP failures most common. Check Event Viewer ModernDeployment-Diagnostics-Provider. MDM Diagnostic report in Settings. Intune Enrollment failures blade. Common fixes: increase ESP timeout, verify app detection rules, check connectivity to login.microsoftonline.com.\n\n**Real Scenario:** COVID deployment of 1000 laptops. Vendor ships direct to homes. Employees self-provision in 30 minutes. Total: 2 weeks vs 3 months with imaging. Saved 2000+ hours of IT labor.\n\n**Interview Tip:** I implement Autopilot for all new devices. User-Driven for standard employees, Self-Deploying for kiosks, Pre-Provisioned for VIPs. ESP ensures critical apps install before users access corporate resources.",
quiz:[{q:"Autopilot requires:",o:["SCCM","Group Policy","Microsoft Intune","WSUS"],a:2},{q:"Self-Deploying is for:",o:["Executives","Kiosks and shared devices","Developers","Gaming PCs"],a:1},{q:"ESP blocks access until:",o:["User clicks OK","Critical apps and policies install","30 minutes pass","Admin approves"],a:1},{q:"Subscription Activation does:",o:["Installs new OS","Upgrades Pro to Enterprise via license","Enables Autopilot","Formats the drive"],a:1}]},

{mod:"Deploy Windows",id:"md102-2",title:"Device Identity & Windows 365",
content:"Every device needs an identity type that determines how it connects to your organization.\n\n**Azure AD Joined:** Cloud-only. Device registered with Azure AD. Managed by Intune. Best for: new devices, cloud-first organizations, remote workers. No on-prem dependency.\n\n**Hybrid Azure AD Joined:** Device joined to BOTH on-prem AD and Azure AD. Managed by MECM + Intune (co-management). Best for: organizations transitioning from on-prem with existing Group Policies.\n\n**Azure AD Registered:** Personal device (BYOD). Work account added but device not joined. Only MAM policies apply. Respects personal device ownership.\n\n**Windows Hello for Business:** Passwordless authentication (PIN, fingerprint, face). Keys stored in TPM chip. Phishing-resistant.\n\n**Windows 365 Cloud PC:**\nFull Windows desktop running in Azure. Two editions:\n**Business** (up to 300 users, self-service setup)\n**Enterprise** (Intune-managed, custom networking, Azure AD integration)\n\nSizing: 2vCPU/4GB (light users) to 8vCPU/32GB (developers). Managed with SAME Intune policies as physical PCs.\n\nPerfect for: contractors (provision instantly, deprovision when done), seasonal workers, regulated industries needing controlled environments.\n\n**Interview Tip:**\n\"Azure AD Join for cloud-first. Hybrid Join with co-management as migration bridge. Windows 365 for contractors — instant provisioning, no hardware procurement.\"",
quiz:[{q:"Cloud-only device join:",o:["Hybrid Azure AD Join","Azure AD Joined","Azure AD Registered","Domain Join only"],a:1},{q:"Windows 365 runs in:",o:["On-premises","Azure cloud","User's PC","USB drive"],a:1},{q:"BYOD devices should use:",o:["Azure AD Joined","Hybrid Join","Azure AD Registered (MAM only)","Full enrollment"],a:2},{q:"Windows Hello stores keys in:",o:["Cloud database","TPM chip on device","USB drive","Azure AD"],a:1}]},

{mod:"Device Management",id:"md102-3",title:"Microsoft Intune — Complete Management",
content:"Intune is your cloud command center for managing every device.\n\n**Platforms:** Windows, macOS, iOS/iPadOS, Android (Fully Managed, Work Profile, COPE, Dedicated), Linux, ChromeOS.\n\n**Enrollment Methods:**\nWindows: Autopilot, bulk token, GPO auto-enroll, co-management\niOS/macOS: Apple ADE (zero-touch), Company Portal\nAndroid: Fully Managed (corporate), Work Profile (personal with work container)\n\n**Configuration Profiles (Cloud GPO):**\nDevice restrictions (camera, USB, Bluetooth), Wi-Fi (auto-connect with certs), VPN (always-on, per-app), email (auto-configure Outlook), certificates (SCEP/PKCS), Endpoint Protection (BitLocker, Firewall, Defender), Settings Catalog (5000+ granular settings), Administrative Templates (GPO equivalent).\n\n**Compliance Policies:**\nDefine healthy device: BitLocker ON, minimum OS, antivirus active, firewall ON, not jailbroken. Escalation: Day 0 (mark) -> Day 1 (email) -> Day 3 (push) -> Day 7 (block via CA) -> Day 30 (retire).\n\n**Security Baselines:** Microsoft recommended security configs. Apply to all devices.\n\n**Remote Actions:** Wipe (factory reset), Retire (company data only), Sync, Restart, Rename, BitLocker key rotation, Fresh Start, Autopilot Reset, Locate.\n\n**Interview Tip:**\n\"Intune manages all platforms. Compliance + Conditional Access = Zero Trust for devices. Settings Catalog covers 5000+ settings replacing most GPOs.\"",
quiz:[{q:"Android Work Profile creates:",o:["Full device control","Separate work container on personal device","No management","Blocks personal apps"],a:1},{q:"Security Baselines are:",o:["Custom only","Microsoft recommended security settings","Default settings","Network rules"],a:1},{q:"Retire action does:",o:["Factory reset","Removes only company data","Deletes device record","Blocks network"],a:1},{q:"Compliance escalation Day 7:",o:["Email warning","Push notification","Block access via Conditional Access","Wipe device"],a:2}]},

{mod:"Device Management",id:"md102-4",title:"Defender for Endpoint & Windows Updates",
content:"Protect endpoints and keep them patched.\n\n**Microsoft Defender for Endpoint:**\n**Threat and Vulnerability Management:** Discovers unpatched software and misconfigurations across ALL endpoints. Prioritized recommendations.\n\n**Attack Surface Reduction (ASR) Rules:** Block risky behaviors: Office macros launching child processes, script obfuscation, untrusted executables from USB, credential stealing from LSASS.\n\n**Controlled Folder Access:** RANSOMWARE PROTECTION. Blocks unauthorized applications from modifying protected folders (Documents, Desktop, Pictures). Only approved apps can write.\n\n**EDR (Endpoint Detection and Response):** Investigate active threats. Alert timeline, automated investigation, isolate compromised machines.\n\n**Integration with Intune:** Compliance policy requires acceptable Defender risk score. Conditional Access blocks if risk is High. Auto-unblocks when remediated.\n\n**Windows Update for Business (WUfB):**\nDeployment rings via Intune:\nPreview Ring (IT team, 0 days) -> Pilot (early adopters, 7 days) -> Broad (everyone, 14 days) -> Critical (servers, 30 days)\n\nFeature updates: defer 0-365 days. Quality updates: defer 0-30 days.\nExpedited updates: push critical zero-day patches immediately.\n\n**Autopatch:** Microsoft-managed patching. Microsoft handles rings, monitors, auto-rollbacks. Requires E3+ and Intune.\n\n**Delivery Optimization:** P2P content sharing. Devices on same network share updates instead of each downloading from Microsoft. Dramatically reduces WAN bandwidth.\n\n**BitLocker via Intune:** Enable silently, recovery keys in Azure AD, rotate remotely, compliance enforcement.\n\n**Interview Tip:**\n\"Defender ASR + Controlled Folder Access for defense in depth. WUfB rings for staged updates. Autopatch for hands-off management. BitLocker keys in Azure AD.\"",
quiz:[{q:"Controlled Folder Access prevents:",o:["Phishing","Ransomware encrypting files","DDoS","SQL injection"],a:1},{q:"Autopatch provides:",o:["Manual management","Microsoft-managed automatic patching","Only drivers","Only apps"],a:1},{q:"BitLocker keys stored in:",o:["Local file","Azure AD","USB","Email"],a:1},{q:"WUfB Broad ring deferral:",o:["0 days","7 days","14 days","30 days"],a:2}]},

{mod:"Device Management",id:"md102-5",title:"Co-management, LAPS & Analytics",
content:"Bridge MECM to Intune and protect local admin accounts.\n\n**Co-management (MECM + Intune):**\nShift workloads gradually: Compliance (first, easiest) -> Device Configuration -> Windows Update -> Resource Access -> Endpoint Protection -> Client Apps (last, most complex).\n\nPrerequisites: Hybrid AAD Join, Intune license, MECM 1710+.\n\n**Tenant Attach:** Upload MECM data to Intune portal. See all devices in one place. Run cloud actions (timeline, CMPivot, scripts). Pre-co-management step.\n\n**Remote Help:** Cloud remote assistance. Azure AD auth. Audit logging. Replaces Quick Assist.\n\n**LAPS (Local Admin Password Solution):**\nCloud LAPS in Azure AD. Every device gets UNIQUE random local admin password. Stored in Azure AD. Auto-rotates (default 30 days). Admin retrieves from portal when needed.\n\nWhy critical: Without LAPS, all devices share the SAME local admin password. One compromised = ALL compromised via pass-the-hash.\n\n**Endpoint Analytics:**\n**Startup Performance:** Boot time scores. Identify slowest devices.\n**Proactive Remediations:** Detection script + remediation script on schedule. Example: if disk > 90% full, clear temp files automatically.\n**Application Reliability:** Crash data, hang rates per application.\n**Work From Anywhere:** Score measuring remote work readiness.\n\n**GP to Intune Migration:**\nGroup Policy Analytics: Import GPO backup into Intune, see compatibility (Supported/Partially/Not Supported). Settings Catalog has 5000+ settings. Administrative Templates = direct GPO equivalent.\n\n**Migration Plan:** Tenant Attach -> Co-management -> GP Analytics -> Convert GPOs -> New devices Autopilot -> Decommission MECM (12-18 months).\n\n**Interview Tip:**\n\"Co-management bridges MECM to Intune over 12-18 months. Tenant Attach first for visibility. LAPS prevents pass-the-hash. Proactive Remediations fix issues before users notice.\"",
quiz:[{q:"First co-management workload to shift:",o:["Client Apps","Compliance Policies","OS Deployment","Everything at once"],a:1},{q:"LAPS stores passwords in:",o:["Local text file","Azure AD","Shared email","Manager's computer"],a:1},{q:"Proactive Remediations:",o:["Manual troubleshooting","Auto-detect and fix issues via scripts","Only alerting","Only reporting"],a:1},{q:"GP Analytics shows GPO:",o:["Always compatible","Compatibility with Intune Settings Catalog","Cannot be migrated","Only Windows 11"],a:1}]},

{mod:"Applications",id:"md102-6",title:"App Deployment & Win32 Apps",
content:"Deploy applications to thousands of devices without visiting each one.\n\n**App Types in Intune:**\n**Microsoft Store:** Direct integration. Search and add from new Store.\n**Microsoft 365 Apps:** Built-in wizard. Choose apps, update channel, architecture.\n**Win32 Apps:** Most flexible. Package ANY Windows app.\n**LOB:** .msi, .appx, .ipa, .apk\n**Web Apps:** URL shortcuts on desktop/start menu.\n\n**Win32 App Lifecycle:**\n1. Package with IntuneWinAppUtil.exe (wraps installer into .intunewin)\n2. Upload to Intune, configure install command (msiexec /i app.msi /quiet)\n3. Configure uninstall command\n4. Detection Rules: How Intune knows app is installed (file exists? Registry key? MSI product code? Custom script?)\n5. Requirement Rules: Minimum OS, disk space, RAM, architecture\n6. Dependencies: Install prerequisite apps first\n7. Supersedence: New version replaces old version automatically\n\n**Assignment Types:**\n**Required:** Auto-installs. For critical apps (M365, VPN, Defender).\n**Available:** Appears in Company Portal. User chooses.\n**Uninstall:** Removes from assigned devices.\n\n**Discovered Apps:** Intune collects installed app data from ALL managed devices. See everything across your fleet. Detect shadow IT (unauthorized apps). Verify license compliance.\n\n**Interview Tip:**\n\"Win32 packaging for complex installs with detection rules. Group-based assignment for role-specific apps. Supersedence for version management. Discovered Apps for shadow IT detection.\"",
quiz:[{q:"Win32 apps packaged with:",o:["7-Zip","IntuneWinAppUtil.exe","WinRAR","MSI Builder"],a:1},{q:"Required assignment means:",o:["User must request","Auto-installs without choice","Available in Store","Optional download"],a:1},{q:"Discovered Apps shows:",o:["Only Intune apps","ALL apps on all managed devices","Only Store apps","Only Win32"],a:1},{q:"Supersedence enables:",o:["App deletion","New version auto-replaces old","User downgrade","Side-by-side versions"],a:1}]},

{mod:"Applications",id:"md102-7",title:"MAM, BYOD & Device Lifecycle",
content:"Protect company data on personal devices and manage the full device lifecycle.\n\n**MAM (Mobile Application Management) / App Protection Policies:**\nProtect company data WITHOUT enrolling the personal device:\n- Block copy/paste from Outlook/Teams to WhatsApp/personal email\n- Require PIN or biometric to open managed apps\n- Encrypt app data at rest on the device\n- Block screenshots in managed apps\n- Block third-party keyboards (prevent keyloggers)\n- Minimum OS version requirement\n- Selective wipe: remove ONLY company data when employee leaves\n\nPersonal photos, messages, and apps are COMPLETELY untouched. This respects employee privacy while protecting corporate data.\n\n**App Configuration Policies:** Pre-configure app settings. Auto-configure Outlook with email server, OneDrive with tenant ID.\n\n**Conditional Access Integration:**\nUser tries to access email -> Azure AD authenticates -> Checks: is device enrolled? Compliant? Using approved app? -> If YES: access granted. If NO: blocked until conditions met.\n\nFor BYOD: require approved client apps (Outlook, not Gmail) without requiring device enrollment.\n\n**Device Lifecycle:**\n**Enroll:** Autopilot, ADE, Company Portal\n**Configure:** Profiles + compliance + apps deployed\n**Maintain:** Updates + monitoring + remediations\n**Retire Options:**\nSelective Wipe: Remove company data, keep personal (employee leaves)\nFull Wipe: Factory reset (lost/stolen device)\nFresh Start: Remove all apps, keep user data\nAutopilot Reset: Wipe and re-enroll for next user\n\n**Interview Tip:**\n\"MAM-only for BYOD. App Protection prevents data leakage without enrolling personal devices. Selective wipe protects privacy on offboarding. Conditional Access ties it all together for Zero Trust.\"",
quiz:[{q:"Selective wipe removes:",o:["Everything on device","Only company data (personal stays)","Only personal data","Nothing"],a:1},{q:"MAM works without:",o:["Internet","Device enrollment","Azure AD","Intune license"],a:1},{q:"App Protection can block:",o:["Only screenshots","Copy/paste, screenshots, third-party keyboards, and more","Only email forwarding","Only file downloads"],a:1},{q:"Autopilot Reset:",o:["Deletes device","Wipes and re-enrolls for next user","Updates OS","Backs up data"],a:1}]}
];

function MD102App() {
  const [view, setView] = useState("home");
  const [topicIdx, setTopicIdx] = useState(0);
  const [showQuiz, setShowQuiz] = useState(false);
  const [ans, setAns] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [prog, setProg] = useState(() => { try { return JSON.parse(localStorage.getItem("md102-prog")) || {}; } catch { return {}; } });
  const [intIdx, setIntIdx] = useState(0);
  const [intShow, setIntShow] = useState(false);
  const topRef = useRef(null);
  useEffect(() => { try { localStorage.setItem("md102-prog", JSON.stringify(prog)); } catch {} }, [prog]);
  useEffect(() => { topRef.current?.scrollIntoView({ behavior: "smooth" }); }, [topicIdx, view]);
  const topic = L[topicIdx]; const modules = [...new Set(L.map(l => l.mod))]; const getModTopics = (m) => L.filter(l => l.mod === m);
  const pct = Math.round(Object.keys(prog).filter(k => prog[k]).length / L.length * 100);
  const markDone = () => setProg(p => ({ ...p, [topic.id]: true })); const c = COURSE.color;
  const Render = ({ text }) => text.split("\n").map((line, i) => {
    if (!line && i > 0) return <div key={i} style={{ height: 14 }} />;
    if (line.startsWith("- ")) html = `<span style="color:${c};margin-right:8px">●</span>${line.slice(2)}`;
    return <div key={i} style={{ marginBottom: 6, lineHeight: 1.85, fontSize: 15.5, color: "#dce1eb" }} dangerouslySetInnerHTML={{ __html: html }} />;
  });
  const PB = ({ p, h = 8 }) => <div style={{ width: "100%", height: h, borderRadius: h, background: "rgba(255,255,255,0.06)", overflow: "hidden" }}><div style={{ width: `${p}%`, height: "100%", borderRadius: h, background: `linear-gradient(90deg, ${c}, ${c}cc)`, transition: "width 0.6s" }} /></div>;
  const Card = ({ children, onClick, style: s = {} }) => <div onClick={onClick} onMouseEnter={onClick ? e => { e.currentTarget.style.background = "rgba(255,255,255,0.05)"; e.currentTarget.style.transform = "translateY(-1px)"; } : undefined} onMouseLeave={onClick ? e => { e.currentTarget.style.background = "rgba(255,255,255,0.025)"; e.currentTarget.style.transform = "none"; } : undefined} style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 16, padding: 22, marginBottom: 14, transition: "all 0.2s", cursor: onClick ? "pointer" : "default", ...s }}>{children}</div>;
  const Btn = ({ children, onClick, bg = c, color: cl = "#fff", disabled, style: s = {} }) => <button onClick={onClick} disabled={disabled} style={{ padding: "12px 24px", borderRadius: 12, border: "none", cursor: disabled ? "default" : "pointer", fontWeight: 600, fontSize: 14, background: bg, color: cl, transition: "all 0.15s", opacity: disabled ? 0.4 : 1, ...s }}>{children}</button>;
  const Chip = ({ children, bg, color: cl }) => <span style={{ display: "inline-block", padding: "5px 14px", borderRadius: 20, fontSize: 12, fontWeight: 600, background: bg || c + "18", color: cl || c }}>{children}</span>;
  const S = `*{box-sizing:border-box;margin:0}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}button:hover{filter:brightness(1.08)}button:active{transform:scale(0.98)}`;
  const Nav = ({title, right}) => <nav style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(10,14,26,0.92)", borderBottom: "1px solid rgba(255,255,255,0.05)", padding: "0 16px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 50, backdropFilter: "blur(16px)" }}><div style={{ display: "flex", alignItems: "center", gap: 10 }}><button onClick={() => setView("home")} style={{ background: "none", border: "none", color: "#e8ecf4", cursor: "pointer", fontSize: 18 }}>←</button><span style={{ fontWeight: 800, fontSize: 14, color: c }}>{title}</span></div>{right && <span style={{ fontSize: 12, color: "#5a6478" }}>{right}</span>}</nav>;

  if (view === "home") return <div style={{ fontFamily: "'DM Sans','Segoe UI',sans-serif", minHeight: "100vh", background: "#0a0e1a", color: "#e8ecf4" }}>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 16px 60px" }}>
      <div style={{ textAlign: "center", padding: "32px 0 20px" }}>
        <div style={{ fontSize: 60, marginBottom: 8 }}>{COURSE.icon}</div>
        <h1 style={{ fontSize: 28, fontWeight: 900, color: c, margin: "0 0 4px" }}>{COURSE.title}</h1>
        <p style={{ color: "#8892a6", fontSize: 14, margin: "0 0 4px" }}>{COURSE.desc}</p>
        <p style={{ color: "#5a6478", fontSize: 12, margin: "0 0 16px" }}>by <span style={{ color: "#FF6B35", fontWeight: 700 }}>Ram Mohan Pathak</span></p>
        <div style={{ display: "flex", alignItems: "center", gap: 12, justifyContent: "center", maxWidth: 400, margin: "0 auto" }}>
          <PB p={pct} /><span style={{ fontSize: 16, fontWeight: 700, color: c }}>{pct}%</span><span style={{ fontSize: 12, color: "#5a6478" }}>{Object.keys(prog).filter(k => prog[k]).length}/{L.length}</span>
        </div>
      </div>
      <div style={{ display: "flex", gap: 10, margin: "0 0 20px", flexWrap: "wrap" }}>
        {[{ v: L.length, l: "Lessons", ic: "📖" }, { v: L.reduce((a, l) => a + l.quiz.length, 0), l: "Quiz Q's", ic: "📝" }, { v: COURSE.interview.length, l: "Interview", ic: "🎙️" }, { v: COURSE.roles.length, l: "Roles", ic: "💼" }].map((s, i) => <div key={i} style={{ flex: "1 1 100px", background: "rgba(255,255,255,0.025)", borderRadius: 14, padding: "14px 10px", textAlign: "center", border: "1px solid rgba(255,255,255,0.04)" }}><div style={{ fontSize: 14 }}>{s.ic}</div><div style={{ fontSize: 24, fontWeight: 800, color: c }}>{s.v}</div><div style={{ fontSize: 11, color: "#8892a6" }}>{s.l}</div></div>)}
      </div>
      {modules.map((mod, mi) => { const topics = getModTopics(mod); return <div key={mi} style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}><div style={{ width: 28, height: 28, borderRadius: 8, background: c + "20", color: c, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 14 }}>{mi + 1}</div><h3 style={{ margin: 0, fontSize: 17, fontWeight: 700, color: c, flex: 1 }}>{mod}</h3><span style={{ fontSize: 12, color: "#5a6478" }}>{topics.filter(t => prog[t.id]).length}/{topics.length}</span></div>
        {topics.map((t, ti) => { const idx = L.indexOf(t); return <Card key={t.id} onClick={() => { setTopicIdx(idx); setShowQuiz(false); setAns({}); setSubmitted(false); setView("topic"); }} style={{ display: "flex", alignItems: "center", gap: 12, padding: 16, borderColor: prog[t.id] ? "#34d39930" : "rgba(255,255,255,0.04)" }}>
          <div style={{ width: 34, height: 34, borderRadius: "50%", background: prog[t.id] ? "#34d39912" : "rgba(255,255,255,0.03)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0, color: prog[t.id] ? "#34d399" : "#5a6478" }}>{prog[t.id] ? "✅" : `${mi + 1}.${ti + 1}`}</div>
          <div style={{ flex: 1 }}><div style={{ fontWeight: 600, fontSize: 14, color: "#e8ecf4" }}>{t.title}</div><div style={{ fontSize: 11, color: "#5a6478", marginTop: 2 }}>📝 {t.quiz.length} quiz questions</div></div>
          <span style={{ fontSize: 18, color: "#5a6478" }}>→</span></Card>; })}
      </div>; })}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 10 }}>
        <Card onClick={() => setView("interview")} style={{ cursor: "pointer" }}><h3 style={{ margin: "0 0 6px", fontSize: 16, color: "#a78bfa" }}>🎙️ Interview Prep</h3><p style={{ fontSize: 12, color: "#8892a6", margin: 0 }}>{COURSE.interview.length} questions with model answers</p></Card>
        <Card onClick={() => setView("career")} style={{ cursor: "pointer" }}><h3 style={{ margin: "0 0 6px", fontSize: 16, color: "#34d399" }}>💼 Career & Resume</h3><p style={{ fontSize: 12, color: "#8892a6", margin: 0 }}>{COURSE.roles.length} roles + resume bullets</p></Card>
      </div>
      <div style={{ textAlign: "center", padding: "24px 0", color: "#3d4556", fontSize: 11 }}>Smart Tutor Ram — AZ900 by Ram Mohan Pathak</div>
    </div><style>{S}</style></div>;

  if (view === "topic") { const score = topic.quiz.filter((q, i) => ans[i] === q.a).length; return <div style={{ fontFamily: "'DM Sans','Segoe UI',sans-serif", minHeight: "100vh", background: "#0a0e1a", color: "#e8ecf4" }}>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" /><div ref={topRef} />
    <Nav title={COURSE.title.split(":")[0]} right={`${topicIdx+1}/${L.length}`} />
    <div style={{ maxWidth: 800, margin: "0 auto", padding: "20px 16px 60px" }}>
      <Chip>{topic.mod}</Chip><h2 style={{ margin: "10px 0 16px", fontSize: 24, fontWeight: 800, color: "#e8ecf4" }}>{topic.title}</h2>
      <div style={{ display: "flex", gap: 4, marginBottom: 20, background: "rgba(255,255,255,0.02)", borderRadius: 12, padding: 4 }}>
        <Btn onClick={() => setShowQuiz(false)} bg={!showQuiz ? c : "transparent"} color={!showQuiz ? "#fff" : "#8892a6"} style={{ flex: 1 }}>📖 Lesson</Btn>
        <Btn onClick={() => { setShowQuiz(true); setAns({}); setSubmitted(false); }} bg={showQuiz ? c : "transparent"} color={showQuiz ? "#fff" : "#8892a6"} style={{ flex: 1 }}>📝 Quiz ({topic.quiz.length})</Btn>
      </div>
      {!showQuiz ? <Card style={{ padding: 32, lineHeight: 1.85 }}><Render text={topic.content} /><div style={{ marginTop: 28, paddingTop: 18, borderTop: "1px solid rgba(255,255,255,0.06)", display: "flex", gap: 10, flexWrap: "wrap" }}>
        {!prog[topic.id] ? <Btn onClick={markDone} bg="#34d399" color="#000">✅ Mark Complete</Btn> : <Chip bg="#34d39918" color="#34d399">✅ Completed</Chip>}
        {topicIdx < L.length - 1 && <Btn onClick={() => { setTopicIdx(topicIdx + 1); setShowQuiz(false); setAns({}); setSubmitted(false); }} bg={c + "20"} color={c}>Next Topic →</Btn>}
      </div></Card>
      : <div>{topic.quiz.map((q, qi) => { const sel = ans[qi]; return <Card key={qi} style={{ borderColor: submitted && sel === q.a ? "#34d39930" : submitted && sel !== undefined && sel !== q.a ? "#f8717130" : "rgba(255,255,255,0.04)" }}>
        <p style={{ margin: "0 0 14px", fontWeight: 700, fontSize: 15, color: "#e8ecf4" }}>Q{qi + 1}: {q.q}</p>
        {q.o.map((opt, oi) => <button key={oi} onClick={() => !submitted && setAns(p => ({ ...p, [qi]: oi }))} style={{ display: "block", width: "100%", textAlign: "left", padding: "14px 18px", marginBottom: 8, borderRadius: 12, border: `1px solid ${submitted && oi === q.a ? "#34d39930" : submitted && sel === oi && oi !== q.a ? "#f8717130" : sel === oi ? c + "30" : "transparent"}`, background: submitted && oi === q.a ? "#34d39912" : submitted && sel === oi && oi !== q.a ? "#f8717112" : sel === oi ? c + "12" : "rgba(255,255,255,0.02)", color: submitted && oi === q.a ? "#34d399" : submitted && sel === oi && oi !== q.a ? "#f87171" : sel === oi ? c : "#e8ecf4", cursor: submitted ? "default" : "pointer", fontWeight: 500, fontSize: 14 }}>{String.fromCharCode(65 + oi)}. {opt}{submitted && oi === q.a && " ✅"}{submitted && sel === oi && oi !== q.a && " ❌"}</button>)}
      </Card>; })}
      {!submitted ? <Btn onClick={() => setSubmitted(true)} disabled={Object.keys(ans).length !== topic.quiz.length} style={{ width: "100%", padding: 14, fontSize: 16 }}>Submit</Btn>
      : <Card style={{ textAlign: "center" }}><div style={{ fontSize: 40 }}>{score === topic.quiz.length ? "🎉" : "📚"}</div><h3 style={{ margin: "8px 0", color: "#e8ecf4" }}>Score: {score}/{topic.quiz.length}</h3><div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 12 }}><Btn onClick={() => { setAns({}); setSubmitted(false); }} bg={c + "20"} color={c}>Retry</Btn>{topicIdx < L.length - 1 && <Btn onClick={() => { setTopicIdx(topicIdx + 1); setShowQuiz(false); setAns({}); setSubmitted(false); }}>Next →</Btn>}</div></Card>}
      </div>}
    </div><style>{S}</style></div>; }

  if (view === "interview") { const q = COURSE.interview[intIdx]; return <div style={{ fontFamily: "'DM Sans','Segoe UI',sans-serif", minHeight: "100vh", background: "#0a0e1a", color: "#e8ecf4" }}>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <Nav title="🎙️ Interview Prep" right={`${intIdx+1}/${COURSE.interview.length}`} />
    <div style={{ maxWidth: 800, margin: "0 auto", padding: "20px 16px 60px" }}>
      <PB p={(intIdx + 1) / COURSE.interview.length * 100} h={4} />
      <Card style={{ marginTop: 16 }}><p style={{ fontSize: 11, color: "#5a6478", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, margin: "0 0 8px" }}>Interviewer asks:</p><h3 style={{ margin: 0, fontSize: 20, lineHeight: 1.5, color: "#e8ecf4" }}>"{q.q}"</h3></Card>
      {!intShow ? <Btn onClick={() => setIntShow(true)} bg="linear-gradient(135deg, #7c3aed, #ec4899)" style={{ width: "100%", padding: 14, fontSize: 16 }}>💡 Reveal Answer</Btn>
      : <Card style={{ borderColor: "#7c3aed25" }}><p style={{ fontSize: 11, color: "#a78bfa", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, margin: "0 0 10px" }}>Model Answer:</p><Render text={q.a} /></Card>}
      <div style={{ display: "flex", gap: 8, marginTop: 14 }}><Btn onClick={() => { setIntIdx(i => i - 1); setIntShow(false); }} disabled={intIdx === 0} bg="rgba(255,255,255,0.04)" color="#e8ecf4" style={{ flex: 1 }}>← Prev</Btn><Btn onClick={() => { setIntIdx(i => i + 1); setIntShow(false); }} disabled={intIdx === COURSE.interview.length - 1} style={{ flex: 1 }}>Next →</Btn></div>
    </div><style>{S}</style></div>; }

  if (view === "career") return <div style={{ fontFamily: "'DM Sans','Segoe UI',sans-serif", minHeight: "100vh", background: "#0a0e1a", color: "#e8ecf4" }}>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <Nav title="💼 Career Guide" />
    <div style={{ maxWidth: 800, margin: "0 auto", padding: "20px 16px 60px" }}>
      <Card><h3 style={{ margin: "0 0 14px", fontSize: 18, color: "#34d399" }}>💼 Roles After This Certification</h3><div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>{COURSE.roles.map((r, i) => <Chip key={i} bg="#34d39912" color="#34d399">{r}</Chip>)}</div></Card>
      <Card><h3 style={{ margin: "0 0 14px", fontSize: 18, color: c }}>📄 Resume Bullets</h3>{COURSE.resume.map((b, i) => <div key={i} style={{ display: "flex", gap: 10, marginBottom: 12 }}><span style={{ color: c, fontSize: 16, marginTop: 2, flexShrink: 0 }}>●</span><p style={{ margin: 0, fontSize: 14, lineHeight: 1.7, color: "#e8ecf4" }}>{b}</p></div>)}</Card>
    </div><style>{S}</style></div>;
  return null;
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(MD102App));
</script>
</body>
</html>
